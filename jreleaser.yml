project:
  name: release-test
  version: 0.3.0
  description: Minimal project to test Maven Central publishing
  links:
    homepage: https://github.com/fabisev/release-test
  authors:
    - fabisev
  license: MIT
  copyright: fabisev
  inceptionYear: "2026"

release:
  github:
    skipRelease: true

signing:
  active: ALWAYS
  armored: true

deploy:
  maven:
    mavenCentral:
      sonatype:
        active: ALWAYS
        url: https://central.sonatype.com/api/v1/publisher
        stagingRepositories:
          - target/staging-deploy
